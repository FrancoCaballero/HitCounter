<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hit Counter Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Orbitron:wght@700;900&family=Press+Start+2P&family=Russo+One&family=Black+Ops+One&family=Bebas+Neue&family=Audiowide&family=Creepster&family=Bungee&family=Metal+Mania&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #ffb454;
    --good: #4ade80;
    --bad: #f87171;
    --muted: #b8c0d4;
    --text: #ffffff;
    --shadow: 0 2px 6px rgba(0,0,0,0.85), 0 0 14px rgba(0,0,0,0.6);
    --pad: 18px;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--text);
    font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body { padding: var(--pad); }
  .wrap { display: inline-block; }
  .conn-off { opacity: 0.45; }

  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text);
    text-shadow: var(--shadow);
    margin-bottom: 6px;
    text-align: center;
  }
  .title:empty { display: none; }

  .title.font-cinzel { font-family: "Cinzel", serif; letter-spacing: 2px; text-transform: uppercase; }
  .title.font-orbitron { font-family: "Orbitron", sans-serif; letter-spacing: 3px; text-transform: uppercase; }
  .title.font-pressstart { font-family: "Press Start 2P", monospace; letter-spacing: 0; font-size: 16px; }
  .title.font-russo { font-family: "Russo One", sans-serif; letter-spacing: 1px; text-transform: uppercase; }
  .title.font-blackops { font-family: "Black Ops One", system-ui; letter-spacing: 2px; text-transform: uppercase; }
  .title.font-bebas { font-family: "Bebas Neue", sans-serif; letter-spacing: 3px; font-size: 28px; }
  .title.font-audiowide { font-family: "Audiowide", sans-serif; letter-spacing: 2px; text-transform: uppercase; }
  .title.font-creepster { font-family: "Creepster", system-ui; letter-spacing: 2px; font-size: 30px; }
  .title.font-bungee { font-family: "Bungee", sans-serif; letter-spacing: 1px; text-transform: uppercase; }
  .title.font-metal { font-family: "Metal Mania", system-ui; letter-spacing: 2px; font-size: 30px; }

  .hits {
    font-size: 84px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    text-shadow: var(--shadow);
  }
  .timer {
    font-size: 40px;
    font-weight: 800;
    text-shadow: var(--shadow);
    letter-spacing: 1px;
  }
  .pb { color: var(--muted); font-size: 15px; text-shadow: var(--shadow); }
  .split {
    margin-top: 8px;
    font-size: 18px;
    font-weight: 700;
    text-shadow: var(--shadow);
  }
  .split .name { color: var(--text); }
  .split .sub  { color: var(--muted); font-weight: 500; margin-left: 8px; font-size: 14px; }
  .delta.good { color: var(--good); }
  .delta.bad  { color: var(--bad); }

  /* === default theme === */
  body.theme-default .row { display: flex; align-items: center; gap: 22px; }
  body.theme-default .meta { display: flex; flex-direction: column; gap: 4px; }

  body.theme-compact .title { font-size: 14px; margin-bottom: 2px; }
  body.theme-hits .title { font-size: 26px; margin-bottom: 8px; }
  body.theme-minimal .title { font-size: 12px; margin-bottom: 2px; }
  body.theme-vertical .title { font-size: 28px; }
  body.theme-bigsplit .title { font-size: 20px; }

  /* === compact: HITS · TIME in one line === */
  body.theme-compact .row {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  body.theme-compact .hits { font-size: 48px; }
  body.theme-compact .timer { font-size: 28px; color: var(--text); }
  body.theme-compact .pb { display: none; }
  body.theme-compact .split { display: none; }

  /* === vertical: stacked === */
  body.theme-vertical .row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  body.theme-vertical .hits { font-size: 96px; }
  body.theme-vertical .timer { font-size: 32px; }
  body.theme-vertical .meta { order: 2; }

  /* === hits-only: just the number === */
  body.theme-hits .timer,
  body.theme-hits .pb,
  body.theme-hits .split { display: none; }
  body.theme-hits .hits { font-size: 140px; }
  body.theme-hits .row { display: block; }

  /* === minimal: small text everything === */
  body.theme-minimal .row { display: flex; align-items: baseline; gap: 12px; }
  body.theme-minimal .hits { font-size: 28px; }
  body.theme-minimal .timer { font-size: 20px; }
  body.theme-minimal .pb { font-size: 11px; }
  body.theme-minimal .split { font-size: 12px; margin-top: 4px; }
  body.theme-minimal .split .sub { font-size: 11px; }

  /* === table: all splits listed === */
  body.theme-table .row { display: none; }
  body.theme-table .split { display: none; }
  body.theme-table .title { text-align: center; margin-bottom: 10px; font-size: 20px; }
  body.theme-table .splits-table {
    border-collapse: collapse;
    color: var(--text);
    text-shadow: var(--shadow);
    font-size: 16px;
    min-width: 360px;
  }
  body.theme-table .splits-table th {
    text-align: right;
    font-weight: 600;
    color: var(--muted);
    padding: 4px 10px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  body.theme-table .splits-table th:first-child { text-align: left; }
  body.theme-table .splits-table td {
    padding: 5px 10px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  body.theme-table .splits-table td.name {
    text-align: left;
    font-weight: 600;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  body.theme-table .splits-table tr.active td { color: var(--accent); }
  body.theme-table .splits-table tr.done { opacity: 0.72; }
  body.theme-table .splits-table tr.sep td {
    padding: 2px 10px;
    text-align: center;
    color: var(--muted);
    border-top: 1px dashed rgba(255,255,255,0.2);
  }
  body.theme-table .splits-table .delta.good { color: var(--good); }
  body.theme-table .splits-table .delta.bad { color: var(--bad); }
  body.theme-table .splits-totals {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.2);
    display: flex;
    justify-content: space-between;
    gap: 24px;
    font-size: 18px;
    font-weight: 700;
    text-shadow: var(--shadow);
  }
  body.theme-table .splits-totals .accent { color: var(--accent); }

  /* element toggles */
  body.hide-title .title { display: none !important; }
  body.hide-totalhits .hits { display: none !important; }
  body.hide-totaltimer .timer { display: none !important; }
  body.hide-totalpb .pb { display: none !important; }
  body.hide-activesplit .split { display: none !important; }
  body.hide-tabletotals .splits-totals { display: none !important; }
  body.hide-col-hits .splits-table .col-hits { display: none; }
  body.hide-col-delta .splits-table .col-delta { display: none; }
  body.hide-col-time .splits-table .col-time { display: none; }
  body.hide-col-pb .splits-table .col-pb { display: none; }

  /* === bigsplit: highlight current split === */
  body.theme-bigsplit .row { display: flex; align-items: center; gap: 18px; }
  body.theme-bigsplit .hits { font-size: 64px; }
  body.theme-bigsplit .timer { font-size: 30px; }
  body.theme-bigsplit .split { font-size: 26px; margin-top: 10px; }
  body.theme-bigsplit .split .sub { font-size: 16px; }
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="title" id="title"></div>
  <div class="row">
    <div class="hits" id="hits">0</div>
    <div class="meta">
      <div class="timer" id="timer">00:00.00</div>
      <div class="pb" id="pb">PB: — · Best Hits: —</div>
    </div>
  </div>
  <div class="split" id="split"></div>
  <table class="splits-table" id="splitsTable" style="display:none">
    <thead>
      <tr><th>Split</th><th class="col-hits">Hits / PB</th><th class="col-delta">Δ</th><th class="col-time">Time</th><th class="col-pb">PB time</th></tr>
    </thead>
    <tbody id="splitsTbody"></tbody>
  </table>
  <div class="splits-totals" id="splitsTotals" style="display:none">
    <span>Total: <span class="accent" id="totHits">0</span> hits</span>
    <span id="totTime">00:00.00</span>
  </div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const validThemes = ["default", "compact", "vertical", "hits", "minimal", "bigsplit", "table"];
  const validFonts = ["cinzel","orbitron","pressstart","russo","blackops","bebas","audiowide","creepster","bungee","metal"];
  const DEFAULT_SHADOW = "0 2px 6px rgba(0,0,0,0.85), 0 0 14px rgba(0,0,0,0.6)";
  let tableRows = 8;

  function setVar(name, val) {
    if (val) document.documentElement.style.setProperty(name, val);
    else document.documentElement.style.removeProperty(name);
  }
  function withHash(v) {
    if (!v) return null;
    return v.startsWith("#") ? v : "#" + v;
  }

  function applyStyle(s) {
    s = s || {};
    const theme = (s.theme || "default").toLowerCase();
    const cls = ["theme-" + (validThemes.includes(theme) ? theme : "default")];
    const show = s.show || {};
    const flag = (k, def) => (k in show ? !!show[k] : def);
    if (!flag("title", true)) cls.push("hide-title");
    if (!flag("totalHits", true)) cls.push("hide-totalhits");
    if (!flag("totalTimer", true)) cls.push("hide-totaltimer");
    if (!flag("totalPb", true)) cls.push("hide-totalpb");
    if (!flag("activeSplit", true)) cls.push("hide-activesplit");
    if (!flag("tableTotals", true)) cls.push("hide-tabletotals");
    if (!flag("colHits", true)) cls.push("hide-col-hits");
    if (!flag("colDelta", true)) cls.push("hide-col-delta");
    if (!flag("colTime", true)) cls.push("hide-col-time");
    if (!flag("colPb", true)) cls.push("hide-col-pb");
    document.body.className = cls.join(" ");

    const tr = parseInt(s.tableRows, 10);
    tableRows = isFinite(tr) && tr >= 1 ? tr : 8;

    const titleEl = document.getElementById("title");
    titleEl.className = "title";
    const tf = (s.titleFont || "").toLowerCase();
    if (validFonts.includes(tf)) titleEl.classList.add("font-" + tf);

    setVar("--accent", withHash(s.accent) || "#ffb454");
    setVar("--text", withHash(s.text) || "#ffffff");
    setVar("--good", withHash(s.good) || "#4ade80");
    setVar("--bad", withHash(s.bad) || "#f87171");
    setVar("--muted", withHash(s.muted) || "#b8c0d4");
    setVar("--shadow", s.noShadow ? "none" : DEFAULT_SHADOW);

    const scale = parseFloat(s.scale);
    if (scale && scale !== 1) {
      document.body.style.transform = `scale(${scale})`;
      document.body.style.transformOrigin = "top left";
    } else {
      document.body.style.transform = "";
    }
  }

  // Initial style from URL params as fallback until WS delivers stored style.
  applyStyle({
    theme: params.get("theme") || "default",
    titleFont: params.get("titlefont") || "",
    accent: params.get("accent"),
    text: params.get("text"),
    good: params.get("good"),
    bad: params.get("bad"),
    muted: params.get("muted"),
    scale: params.get("scale") || "1",
    noShadow: params.get("noshadow") === "1",
  });

  const $ = (id) => document.getElementById(id);
  const fmt = (ms) => {
    const t = Math.max(0, Math.floor(ms));
    const h = Math.floor(t / 3600000);
    const m = Math.floor((t % 3600000) / 60000);
    const s = Math.floor((t % 60000) / 1000);
    const cs = Math.floor((t % 1000) / 10);
    const p = (n, w=2) => String(n).padStart(w, "0");
    return h > 0 ? `${h}:${p(m)}:${p(s)}.${p(cs)}` : `${p(m)}:${p(s)}.${p(cs)}`;
  };

  let state = null;

  function buildWindow(splits, activeIdx, maxRows) {
    const n = splits.length;
    if (n === 0) return [];
    if (n <= maxRows) return splits.map((_, i) => ({ i, sep: false }));
    const lastIdx = n - 1;
    const focus = activeIdx >= 0 && activeIdx < n ? activeIdx : 0;
    const pinLast = focus < lastIdx;
    const win = pinLast ? Math.max(1, maxRows - 1) : maxRows;
    let start = Math.max(0, focus - Math.floor(win / 2));
    let end = start + win;
    const cap = pinLast ? lastIdx : n;
    if (end > cap) { end = cap; start = Math.max(0, end - win); }
    const out = [];
    for (let i = start; i < end; i++) out.push({ i, sep: false });
    if (pinLast) {
      if (end < lastIdx) out.push({ i: lastIdx, sep: true });
      else out.push({ i: lastIdx, sep: false });
    }
    return out;
  }

  function renderTable() {
    const tbody = $("splitsTbody");
    const splits = Array.isArray(state.splits) ? state.splits : [];
    const activeIdx = state.activeIdx ?? -1;
    const visible = buildWindow(splits, activeIdx, tableRows);
    const rows = visible.map(({ i, sep }) => {
      const sp = splits[i];
      const delta = sp.pbHits != null ? sp.hits - sp.pbHits : null;
      const dCls = delta == null ? "" : delta < 0 ? "good" : delta > 0 ? "bad" : "";
      const dTxt = delta == null ? "—" : delta > 0 ? `+${delta}` : delta;
      let rowCls = "";
      if (state.isRunning && i === activeIdx) rowCls = "active";
      else if (i < activeIdx || (state.isFinished && i <= activeIdx)) rowCls = "done";
      if (sep) rowCls += " sep";
      let liveMs = sp.timeMs ?? 0;
      if (state.isRunning && i === activeIdx) liveMs += Date.now() - state.tsMs;
      const timeTxt = liveMs > 0 ? fmt(liveMs) : "—";
      const pbTxt = sp.pbTimeMs != null ? fmt(sp.pbTimeMs) : "—";
      return `<tr class="${rowCls.trim()}">
        <td class="name">${escapeHtml(sp.name ?? "")}</td>
        <td class="col-hits">${sp.hits ?? 0}${sp.pbHits != null ? ` / ${sp.pbHits}` : ""}</td>
        <td class="col-delta delta ${dCls}">${dTxt}</td>
        <td class="col-time">${timeTxt}</td>
        <td class="col-pb">${pbTxt}</td>
      </tr>`;
    }).join("");
    tbody.innerHTML = rows;

    $("totHits").textContent = state.totalHits ?? 0;
    let runMs = state.runElapsedMs ?? 0;
    if (state.isRunning) runMs += Date.now() - state.tsMs;
    $("totTime").textContent = fmt(runMs);
  }

  function render() {
    if (!state) return;
    const isTable = document.body.classList.contains("theme-table");
    $("splitsTable").style.display = isTable ? "" : "none";
    $("splitsTotals").style.display = isTable ? "" : "none";
    if (isTable) {
      $("title").textContent = state.title ?? "";
      renderTable();
      return;
    }
    $("title").textContent = state.title ?? "";
    $("hits").textContent = state.totalHits ?? 0;

    let runMs = state.runElapsedMs ?? 0;
    if (state.isRunning) runMs = (state.runElapsedMs ?? 0) + (Date.now() - state.tsMs);
    $("timer").textContent = fmt(runMs);

    const pbT = state.totalPbTimeMs;
    const pbH = state.totalPbHits;
    $("pb").textContent = `PB: ${pbH ?? "—"} · PB time: ${pbT != null ? fmt(pbT) : "—"}`;

    const sp = state.activeSplit;
    if (sp) {
      let splitMs = sp.timeMs ?? 0;
      if (state.isRunning) splitMs += Date.now() - state.tsMs;
      const delta = sp.pbHits != null ? sp.hits - sp.pbHits : null;
      const dCls = delta == null ? "" : delta < 0 ? "good" : delta > 0 ? "bad" : "";
      const dTxt = delta == null ? "" : delta > 0 ? `+${delta}` : delta;
      $("split").innerHTML = `
        <span class="name">${escapeHtml(sp.name ?? "")}</span>
        <span class="sub">${sp.hits ?? 0} hits${sp.pbHits != null ? ` / PB ${sp.pbHits}` : ""} <span class="delta ${dCls}">${dTxt}</span></span>
        <span class="sub">${fmt(splitMs)}${sp.pbTimeMs != null ? ` / ${fmt(sp.pbTimeMs)}` : ""}</span>
      `;
    } else {
      $("split").textContent = "";
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        document.getElementById("root").classList.remove("conn-off");
        if (msg && msg.kind === "style") {
          applyStyle(msg.data || {});
        } else if (msg && msg.kind === "state") {
          state = msg.data;
          render();
        } else {
          // Backwards compat: untagged payload treated as state.
          state = msg;
          render();
        }
      } catch {}
    };
    ws.onclose = () => {
      document.getElementById("root").classList.add("conn-off");
      setTimeout(connect, 1000);
    };
    ws.onerror = () => ws.close();
  }
  connect();
  setInterval(render, 33);
</script>
</body>
</html>
